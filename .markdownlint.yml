# Markdownlint configuration
# https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

# Allow long lines — skill definitions and references often have wide tables
MD013: false

# Allow duplicate headings in different sections (common in skill files)
MD024:
  siblings_only: true

# Allow HTML in markdown (used in some skill templates)
MD033: false

# Allow bare URLs
MD034: false
