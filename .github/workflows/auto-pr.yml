name: Auto PR

on:
  push:
    branches: ['feat/**', 'fix/**', 'chore/**']

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  open-pr:
    name: Open Pull Request
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Determine PR metadata from branch name
        id: meta
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          prefix="${branch%%/*}"

          case "$prefix" in
            feat)  label="new-skill" ;;
            fix)   label="skill-update" ;;
            chore) label="governance" ;;
            *)     label="" ;;
          esac

          # Build a human-readable title from the branch suffix
          # e.g. feat/my-new-skill -> my-new-skill -> My new skill
          suffix="${branch#*/}"
          title=$(echo "$suffix" | tr '-' ' ' | sed 's/.*/\u&/')

          echo "label=$label" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Create PR if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --head "${{ steps.meta.outputs.branch }}" --state open --json number --jq 'length')

          if [ "$existing" -gt 0 ]; then
            echo "PR already exists for branch ${{ steps.meta.outputs.branch }}, skipping."
            exit 0
          fi

          label_flag=""
          if [ -n "${{ steps.meta.outputs.label }}" ]; then
            label_flag="--label ${{ steps.meta.outputs.label }}"
          fi

          gh pr create \
            --title "${{ steps.meta.outputs.title }}" \
            --body "Automated PR for branch \`${{ steps.meta.outputs.branch }}\`." \
            --base main \
            --head "${{ steps.meta.outputs.branch }}" \
            --draft \
            $label_flag
