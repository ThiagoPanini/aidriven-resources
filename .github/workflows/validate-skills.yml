name: Validate Skills

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'chore/**']
    paths:
      - 'skills/**'
      - 'skills.json'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'skills.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  validate-structure:
    name: Validate Skill Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check every skill has a SKILL.md
        run: |
          exit_code=0
          for dir in skills/*/; do
            skill_name=$(basename "$dir")
            if [ ! -f "${dir}SKILL.md" ]; then
              echo "::error::Skill '${skill_name}' is missing SKILL.md"
              exit_code=1
            fi
          done

          if [ "$exit_code" -eq 0 ]; then
            echo "All skills have a SKILL.md entry point."
          fi
          exit $exit_code

      - name: Check SKILL.md has frontmatter
        run: |
          exit_code=0
          for skill_md in skills/*/SKILL.md; do
            skill_name=$(basename "$(dirname "$skill_md")")
            if ! head -1 "$skill_md" | grep -q '^---$'; then
              echo "::error::${skill_name}/SKILL.md is missing YAML frontmatter (must start with ---)"
              exit_code=1
            fi
          done

          if [ "$exit_code" -eq 0 ]; then
            echo "All SKILL.md files have frontmatter."
          fi
          exit $exit_code

      - name: Check skill directory naming convention
        run: |
          exit_code=0
          for dir in skills/*/; do
            skill_name=$(basename "$dir")
            if ! echo "$skill_name" | grep -qE '^[a-z0-9]+(-[a-z0-9]+)*$'; then
              echo "::error::Skill directory '${skill_name}' does not follow kebab-case naming"
              exit_code=1
            fi
          done

          if [ "$exit_code" -eq 0 ]; then
            echo "All skill directories follow kebab-case naming."
          fi
          exit $exit_code

      - name: Validate skills.json manifest is in sync
        run: |
          if [ ! -f skills.json ]; then
            echo "::error::skills.json manifest is missing"
            exit 1
          fi

          exit_code=0

          # Check every skill directory is listed in the manifest
          for dir in skills/*/; do
            skill_name=$(basename "$dir")
            if ! python3 -c "
          import json, sys
          with open('skills.json') as f:
              data = json.load(f)
          names = [s['name'] for s in data['skills']]
          sys.exit(0 if '${skill_name}' in names else 1)
          "; then
              echo "::error::Skill '${skill_name}' exists in skills/ but is not listed in skills.json"
              exit_code=1
            fi
          done

          # Check every manifest entry points to an existing directory
          python3 -c "
          import json, os, sys
          with open('skills.json') as f:
              data = json.load(f)
          ok = True
          for skill in data['skills']:
              if not os.path.isdir(skill['path']):
                  print(f\"::error::skills.json references '{skill['name']}' at '{skill['path']}' but directory does not exist\")
                  ok = False
              elif not os.path.isfile(os.path.join(skill['path'], skill['entry'])):
                  print(f\"::error::skills.json references entry '{skill['entry']}' for '{skill['name']}' but file does not exist\")
                  ok = False
          sys.exit(0 if ok else 1)
          " || exit_code=1

          if [ "$exit_code" -eq 0 ]; then
            echo "skills.json manifest is in sync with skills/ directory."
          fi
          exit $exit_code
