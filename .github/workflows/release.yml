name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate skills.json version matches tag
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          manifest_version=$(python3 -c "import json; print(json.load(open('skills.json'))['version'])")
          if [ "$tag" != "$manifest_version" ]; then
            echo "::error::Tag v${tag} does not match skills.json version ${manifest_version}"
            exit 1
          fi
          echo "Tag v${tag} matches manifest version."

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
